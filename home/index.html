
<!doctype html>
<html lang="id" style="height: 100%;">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player Autoplay</title>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    body {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: black;
    }

    .video-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
    }

    #videoPlayer {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .loading-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      z-index: 10;
    }

    .loading-message.hidden {
      display: none;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
 </head>
 <body>
  <div class="loading-message" id="loadingMessage">
   Memuat video...
  </div>
  <div class="video-container">
   <video id="videoPlayer" autoplay muted loop playsinline webkit-playsinline preload="auto"></video>
  </div>
  <script>
    const defaultConfig = {
      video_path: "video.mp4"
    };

    const videoPlayer = document.getElementById('videoPlayer');
    const loadingMessage = document.getElementById('loadingMessage');

    async function onConfigChange(config) {
      const videoPath = config.video_path || defaultConfig.video_path;
      
      videoPlayer.src = videoPath;
      
      videoPlayer.addEventListener('loadeddata', () => {
        loadingMessage.classList.add('hidden');
      });

      videoPlayer.addEventListener('error', () => {
        loadingMessage.textContent = '❌ Tidak dapat memuat video. Pastikan file video.mp4 ada di folder yang sama.';
        loadingMessage.classList.remove('hidden');
      });
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ["video_path", config.video_path || defaultConfig.video_path]
        ])
      });
    } else {
      onConfigChange(defaultConfig);
    }
  </script>

</body>
</html>
